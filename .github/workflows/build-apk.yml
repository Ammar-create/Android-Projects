name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Install Android SDK components
      run: |
        sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"
    
    - name: Generate debug keystore
      run: |
        keytool -genkeypair -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias androidkey -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
      working-directory: projects/ReminderApp
    
    - name: Build APK
      run: |
        chmod +x build.sh
        ./build.sh projects/ReminderApp
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-signed
        path: projects/ReminderApp/build/apk/app-signed.apk
        if-no-files-found: error
